<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>For Izuu Pakhi 🎵</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --rose: #e8a0a0;
      --blush: #f5d0d0;
      --deep: #7a3a3a;
      --cream: #fdf6f0;
      --muted: #c49a9a;
      --text: #4a2a2a;
      --card: rgba(255,255,255,0.72);
    }

    body {
      min-height: 100vh;
      background: var(--cream);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      overflow-x: hidden;
      position: relative;
    }

    /* Soft background petals */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 10% 20%, rgba(232,160,160,0.18) 0%, transparent 70%),
        radial-gradient(ellipse 50% 60% at 90% 80%, rgba(245,208,208,0.22) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 50% 50%, rgba(253,246,240,0.4) 0%, transparent 80%);
      pointer-events: none;
      z-index: 0;
    }

    .petals {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .petal {
      position: absolute;
      width: 10px;
      height: 14px;
      background: radial-gradient(ellipse at 30% 30%, #f5d0d0, #e8a0a0cc);
      border-radius: 50% 50% 50% 0;
      opacity: 0;
      animation: fall linear infinite;
    }

    @keyframes fall {
      0%   { transform: translateY(-60px) rotate(0deg); opacity: 0.7; }
      80%  { opacity: 0.5; }
      100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
    }

    .petal:nth-child(1)  { left: 5%;  width: 8px;  height: 11px; animation-duration: 9s;  animation-delay: 0s;   }
    .petal:nth-child(2)  { left: 15%; width: 12px; height: 16px; animation-duration: 12s; animation-delay: 2s;   }
    .petal:nth-child(3)  { left: 28%; width: 7px;  height: 10px; animation-duration: 8s;  animation-delay: 4s;   }
    .petal:nth-child(4)  { left: 42%; width: 10px; height: 14px; animation-duration: 11s; animation-delay: 1s;   }
    .petal:nth-child(5)  { left: 55%; width: 9px;  height: 12px; animation-duration: 10s; animation-delay: 6s;   }
    .petal:nth-child(6)  { left: 68%; width: 11px; height: 15px; animation-duration: 13s; animation-delay: 3s;   }
    .petal:nth-child(7)  { left: 78%; width: 7px;  height: 10px; animation-duration: 7s;  animation-delay: 5s;   }
    .petal:nth-child(8)  { left: 88%; width: 13px; height: 17px; animation-duration: 14s; animation-delay: 0.5s; }
    .petal:nth-child(9)  { left: 32%; width: 6px;  height: 9px;  animation-duration: 9s;  animation-delay: 7s;   }
    .petal:nth-child(10) { left: 62%; width: 10px; height: 13px; animation-duration: 11s; animation-delay: 8s;   }

    /* Layout */
    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    header {
      text-align: center;
      margin-bottom: 2.4rem;
    }

    .for-you {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      font-size: clamp(0.8rem, 2vw, 0.95rem);
      letter-spacing: 0.25em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 0.5rem;
      animation: fadeUp 1s ease both;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(2.2rem, 7vw, 3.8rem);
      line-height: 1.1;
      color: var(--deep);
      animation: fadeUp 1s ease 0.15s both;
    }

    h1 span {
      font-style: italic;
      color: var(--rose);
    }

    .tagline {
      margin-top: 0.8rem;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(0.9rem, 2.5vw, 1.1rem);
      color: var(--muted);
      animation: fadeUp 1s ease 0.3s both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Card */
    .card {
      background: var(--card);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(232,160,160,0.3);
      border-radius: 24px;
      padding: clamp(1.6rem, 5vw, 2.4rem);
      width: 100%;
      max-width: 520px;
      box-shadow: 0 8px 40px rgba(160,80,80,0.08), 0 2px 8px rgba(160,80,80,0.06);
      animation: fadeUp 1s ease 0.4s both;
    }

    .input-wrap {
      position: relative;
      margin-bottom: 1rem;
    }

    .input-label {
      display: block;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    .url-input {
      width: 100%;
      padding: 0.85rem 1.1rem;
      border: 1.5px solid rgba(232,160,160,0.35);
      border-radius: 12px;
      background: rgba(255,255,255,0.8);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.25s, box-shadow 0.25s;
    }

    .url-input::placeholder { color: #cba0a0; }

    .url-input:focus {
      border-color: var(--rose);
      box-shadow: 0 0 0 3px rgba(232,160,160,0.15);
    }

    /* Format selector */
    .formats {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.2rem;
      flex-wrap: wrap;
    }

    .fmt-btn {
      flex: 1;
      min-width: 90px;
      padding: 0.55rem 0.5rem;
      border: 1.5px solid rgba(232,160,160,0.3);
      border-radius: 10px;
      background: transparent;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }

    .fmt-btn.active {
      background: var(--rose);
      border-color: var(--rose);
      color: #fff;
      box-shadow: 0 4px 14px rgba(232,160,160,0.4);
    }

    .fmt-btn:hover:not(.active) {
      border-color: var(--rose);
      color: var(--deep);
    }

    /* Time range */
    .time-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.8rem;
      margin-bottom: 1.4rem;
    }

    .time-input {
      width: 100%;
      padding: 0.7rem 0.9rem;
      border: 1.5px solid rgba(232,160,160,0.3);
      border-radius: 10px;
      background: rgba(255,255,255,0.8);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.25s, box-shadow 0.25s;
    }

    .time-input:focus {
      border-color: var(--rose);
      box-shadow: 0 0 0 3px rgba(232,160,160,0.12);
    }

    .time-input::placeholder { color: #cba0a0; }

    /* Button */
    .convert-btn {
      width: 100%;
      padding: 0.95rem;
      background: linear-gradient(135deg, #e8a0a0, #c97a7a);
      border: none;
      border-radius: 12px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.15rem;
      font-weight: 400;
      letter-spacing: 0.05em;
      color: #fff;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
      box-shadow: 0 6px 20px rgba(201,122,122,0.35);
      position: relative;
      overflow: hidden;
    }

    .convert-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0);
      transition: background 0.2s;
    }

    .convert-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(201,122,122,0.4);
    }

    .convert-btn:active:not(:disabled) { transform: translateY(0); }

    .convert-btn:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    /* Status */
    .status {
      margin-top: 1.2rem;
      text-align: center;
      min-height: 24px;
      font-size: 0.88rem;
      color: var(--muted);
      animation: fadeUp 0.4s ease both;
    }

    .status.error { color: #c0524a; }
    .status.loading { color: var(--rose); }

    /* Result */
    .result-box {
      margin-top: 1.2rem;
      padding: 1.1rem 1.2rem;
      background: rgba(245,208,208,0.2);
      border: 1px solid rgba(232,160,160,0.3);
      border-radius: 14px;
      display: none;
      animation: fadeUp 0.4s ease both;
    }

    .result-box.show { display: block; }

    .result-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      font-weight: 400;
      color: var(--deep);
      margin-bottom: 0.3rem;
    }

    .result-meta {
      font-size: 0.78rem;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    .download-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      padding: 0.65rem 1.3rem;
      background: var(--deep);
      color: #fff;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 14px rgba(122,58,58,0.25);
    }

    .download-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(122,58,58,0.3); }

    /* Spinner */
    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(232,160,160,0.3);
      border-top-color: var(--rose);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Footer quote */
    .love-note {
      margin-top: 2rem;
      text-align: center;
      animation: fadeUp 1s ease 0.6s both;
    }

    .love-note p {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(0.85rem, 2.5vw, 1rem);
      color: var(--muted);
      line-height: 1.7;
      max-width: 360px;
      margin: 0 auto;
    }

    .heart {
      display: inline-block;
      color: var(--rose);
      animation: heartbeat 1.6s ease infinite;
    }

    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      14%       { transform: scale(1.25); }
      28%       { transform: scale(1); }
      42%       { transform: scale(1.18); }
      56%       { transform: scale(1); }
    }
  </style>
</head>
<body>

  <div class="petals">
    <div class="petal"></div><div class="petal"></div>
    <div class="petal"></div><div class="petal"></div>
    <div class="petal"></div><div class="petal"></div>
    <div class="petal"></div><div class="petal"></div>
    <div class="petal"></div><div class="petal"></div>
  </div>

  <div class="page">

    <header>
      <div class="for-you">made with love, for you</div>
      <h1>Izuu <span>Pakhi</span></h1>
      <p class="tagline">Your little music box ✿</p>
    </header>

    <div class="card">
      <label class="input-label" for="urlInput">YouTube Link</label>
      <div class="input-wrap">
        <input
          id="urlInput"
          class="url-input"
          type="url"
          placeholder="Paste a YouTube link here…"
          autocomplete="off"
          spellcheck="false"
        />
      </div>

      <label class="input-label" style="margin-bottom:0.5rem">Format</label>
      <div class="formats">
        <button class="fmt-btn active" data-fmt="mp3">🎵 MP3</button>
        <button class="fmt-btn" data-fmt="videos">🎬 Video</button>
        <button class="fmt-btn" data-fmt="mp3-mp4">✨ Both</button>
      </div>

      <label class="input-label">Trim (optional)</label>
      <div class="time-row">
        <input class="time-input" id="startTime" type="number" min="0" placeholder="Start (sec)" />
        <input class="time-input" id="endTime"   type="number" min="0" placeholder="End (sec)" />
      </div>

      <button class="convert-btn" id="convertBtn" onclick="doConvert()">
        Convert &amp; Download ♪
      </button>

      <div class="status" id="status"></div>

      <div class="result-box" id="resultBox">
        <div class="result-title" id="resTitle"></div>
        <div class="result-meta"  id="resMeta"></div>
        <a class="download-btn" id="resLink" href="#" target="_blank" rel="noopener">
          ↓ &nbsp;Download
        </a>
      </div>
    </div>

    <div class="love-note">
      <p>
        Every song you love deserves to live on your phone forever —<br>
        just like you live in my heart forever. <span class="heart">♥</span>
      </p>
    </div>

  </div>

  <script>
    let selectedFormat = 'mp3';

    document.querySelectorAll('.fmt-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.fmt-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedFormat = btn.dataset.fmt;
      });
    });

    async function doConvert() {
      const urlVal   = document.getElementById('urlInput').value.trim();
      const stime    = document.getElementById('startTime').value.trim();
      const etime    = document.getElementById('endTime').value.trim();
      const status   = document.getElementById('status');
      const resultBox = document.getElementById('resultBox');
      const btn      = document.getElementById('convertBtn');

      resultBox.classList.remove('show');
      status.className = 'status';
      status.innerHTML = '';

      if (!urlVal) {
        status.className = 'status error';
        status.textContent = 'Please paste a YouTube link first 🌸';
        return;
      }

      if (!urlVal.includes('youtube.com') && !urlVal.includes('youtu.be')) {
        status.className = 'status error';
        status.textContent = 'That doesn\'t look like a YouTube link…';
        return;
      }

      btn.disabled = true;
      status.className = 'status loading';
      status.innerHTML = '<span class="spinner"></span>Converting your song…';

      const params = new URLSearchParams({ url: urlVal, format: selectedFormat });
      if (stime) params.set('stime', stime);
      if (etime) params.set('etime', etime);

      const apiUrl = `https://www.yt2mp3converter.net/apis/fetch.php?${params.toString()}`;

      try {
        const res = await fetch(apiUrl);

        if (!res.ok) throw new Error(`Server returned ${res.status}`);

        const data = await res.json();

        if (!data.download) throw new Error('No download link in response.');

        status.innerHTML = '';
        document.getElementById('resTitle').textContent = data.title || 'Your Song';
        document.getElementById('resMeta').textContent =
          [data.duration && `⏱ ${data.duration}`, data.filesize && `📦 ${data.filesize}`]
            .filter(Boolean).join('   ');
        document.getElementById('resLink').href = data.download;
        resultBox.classList.add('show');

      } catch (err) {
        status.className = 'status error';
        status.textContent = `Oops! ${err.message} — try again?`;
      } finally {
        btn.disabled = false;
      }
    }

    document.getElementById('urlInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') doConvert();
    });
  </script>
</body>
</html>
