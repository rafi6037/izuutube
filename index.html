<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IzuTube</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: #0b0f14;
      color: #e8eef5;
      display: grid;
      place-items: center;
      padding: 20px;
    }
    .card {
      width: 100%;
      max-width: 560px;
      background: #111820;
      border: 1px solid #1f2a36;
      border-radius: 14px;
      padding: 20px;
    }
    h1 { margin: 0 0 14px; font-size: 1.4rem; }
    p { margin: 0 0 16px; color: #9fb0c3; font-size: 0.95rem; }
    .grid {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
    .full { grid-column: 1 / -1; }
    label {
      display: block;
      margin-bottom: 6px;
      color: #9fb0c3;
      font-size: 0.82rem;
    }
    input, select, button {
      width: 100%;
      border-radius: 10px;
      border: 1px solid #2a3747;
      background: #0c121a;
      color: #e8eef5;
      padding: 10px 12px;
      font: inherit;
    }
    button {
      cursor: pointer;
      background: #22c55e;
      color: #05210e;
      font-weight: 700;
      border: 0;
    }
    button:hover { filter: brightness(1.05); }
    .msg { margin-top: 12px; font-size: 0.9rem; color: #fca5a5; min-height: 1.2em; }
    .hint { margin-top: 10px; color: #7f93a9; font-size: 0.8rem; word-break: break-all; }
  </style>
</head>
<body>
  <main class="card">
    <h1>IzuTube</h1>
    <p>Frontend-only downloader using <code>https://apisyu.com/single/{TYPE}/{VIDEO_ID}</code>.</p>

    <form id="downloadForm" class="grid">
      <div class="full">
        <label for="video">YouTube URL or Video ID</label>
        <input id="video" type="text" placeholder="https://www.youtube.com/watch?v=TW9d8vYrVFQ" required />
      </div>

      <div>
        <label for="type">Type</label>
        <select id="type">
          <option value="MP3" selected>MP3</option>
          <option value="MP4">MP4</option>
        </select>
      </div>

      <div>
        <label for="audio">Audio</label>
        <input id="audio" type="text" value="320" />
      </div>

      <div>
        <label for="theme">Theme</label>
        <select id="theme">
          <option value="dark" selected>dark</option>
          <option value="light">light</option>
        </select>
      </div>

      <div>
        <label for="lang">Language</label>
        <input id="lang" type="text" value="English" />
      </div>

      <div class="full">
        <button type="submit">Download</button>
      </div>
    </form>

    <div id="msg" class="msg"></div>
    <div id="urlHint" class="hint"></div>
  </main>

  <script>
    const VIDEO_ID_REGEX = /^[A-Za-z0-9_-]{11}$/;

    function extractVideoId(input) {
      const value = (input || '').trim();
      if (!value) return null;
      if (VIDEO_ID_REGEX.test(value)) return value;

      let parsed;
      try {
        parsed = new URL(value);
      } catch (_) {
        return null;
      }

      const host = parsed.hostname.toLowerCase();
      if (host === 'youtu.be' || host === 'www.youtu.be') {
        const id = parsed.pathname.split('/').filter(Boolean)[0];
        return VIDEO_ID_REGEX.test(id || '') ? id : null;
      }

      const v = parsed.searchParams.get('v');
      if (VIDEO_ID_REGEX.test(v || '')) return v;

      const parts = parsed.pathname.split('/').filter(Boolean);
      const markerIndex = parts.findIndex((p) => ['shorts', 'embed', 'live'].includes(p));
      if (markerIndex !== -1) {
        const id = parts[markerIndex + 1];
        return VIDEO_ID_REGEX.test(id || '') ? id : null;
      }

      return null;
    }

    function buildApiUrl({ type, videoId, audio, theme, lang }) {
      const base = `https://apisyu.com/single/${encodeURIComponent(type)}/${encodeURIComponent(videoId)}`;
      const params = new URLSearchParams();
      if (audio) params.set('audio', audio);
      if (theme) params.set('theme', theme);
      if (lang) params.set('lang', lang);
      const query = params.toString();
      return query ? `${base}?${query}` : base;
    }

    document.getElementById('downloadForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const msg = document.getElementById('msg');
      const urlHint = document.getElementById('urlHint');
      msg.textContent = '';

      const videoInput = document.getElementById('video').value;
      const type = document.getElementById('type').value;
      const audio = document.getElementById('audio').value.trim();
      const theme = document.getElementById('theme').value;
      const lang = document.getElementById('lang').value.trim();

      const videoId = extractVideoId(videoInput);
      if (!videoId) {
        msg.textContent = 'Invalid YouTube URL or Video ID.';
        urlHint.textContent = '';
        return;
      }

      const apiUrl = buildApiUrl({ type, videoId, audio, theme, lang });
      urlHint.textContent = apiUrl;
      window.open(apiUrl, '_blank', 'noopener');
    });
  </script>
</body>
</html>
